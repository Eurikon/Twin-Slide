<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="162.56mm" height="128.5mm" viewBox="0 0 162.56 128.5">
  <defs>
    <!-- Background gradient - lighter tints in top third, smooth transition -->
    <linearGradient id="panelGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e2e2e"/>
      <stop offset="12%" style="stop-color:#282828"/>
      <stop offset="33%" style="stop-color:#222222"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>

    <!-- Section container gradient (OLED style) -->
    <linearGradient id="sectionGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#141414"/>
    </linearGradient>

    <!-- Sub-container gradient (subtle depth) -->
    <linearGradient id="subContainerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#252525"/>
      <stop offset="100%" style="stop-color:#1c1c1c"/>
    </linearGradient>

    <!-- Header bar gradient -->
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333333"/>
      <stop offset="100%" style="stop-color:#282828"/>
    </linearGradient>
  </defs>

  <!-- Main panel background -->
  <rect x="0" y="0" width="162.56" height="128.5" fill="url(#panelGradient)"/>

  <!-- Panel border -->
  <rect x="0.3" y="0.3" width="161.96" height="127.9" fill="none" stroke="#000000" stroke-width="0.6"/>

  <!-- ========== COMPACT BAR BEHIND TITLE ========== -->
  <rect x="0.6" y="0.6" width="161.36" height="6.3" fill="#242424"/>

  <!-- ========== MAIN CONTAINERS ========== -->

  <!-- LEFT SIDE: Main container (sequencer, keyboard, attributes) -->
  <rect x="3" y="8" width="102" height="75.3" rx="2" fill="url(#sectionGradient)" stroke="#3a3a3a" stroke-width="0.4"/>

  <!-- RIGHT SIDE: Main container (transport, display) -->
  <rect x="106.6" y="8" width="52.4" height="75.3" rx="2" fill="url(#sectionGradient)" stroke="#3a3a3a" stroke-width="0.4"/>

  <!-- BOTTOM: Full-width Synth + I/O container -->
  <rect x="3" y="85" width="156" height="32" rx="2" fill="url(#sectionGradient)" stroke="#3a3a3a" stroke-width="0.4"/>

  <!-- ========== LEFT SIDE SUB-CONTAINERS ========== -->

  <!-- Sequencer + Keyboard area -->
  <rect x="3.96" y="10" width="100.08" height="44" rx="1.5" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="4.21" y="10.25" width="99.58" height="43.5" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>
  <!-- Step sequencer nested container (all steps, 3px padding) -->
  <rect x="9.3" y="11.4" width="86" height="13" rx="1" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="9.55" y="11.65" width="85.5" height="12.5" rx="0.75" fill="none" stroke="#6b4a20" stroke-width="0.15"/>
  <!-- Horizontal divider between step rows -->
  <line x1="10" y1="18" x2="98.9" y2="18" stroke="#333333" stroke-width="0.15"/>
  <!-- Vertical dividers between step groups -->
  <line x1="30.7" y1="12" x2="30.7" y2="24" stroke="#333333" stroke-width="0.20"/>
  <line x1="52.1" y1="12" x2="52.1" y2="24" stroke="#333333" stroke-width="0.20"/>
  <line x1="73.8" y1="12" x2="73.8" y2="24" stroke="#333333" stroke-width="0.20"/>

  <!-- Attach LED to button connector -->
  <line x1="98.9" y1="19.3" x2="98.9" y2="39.7" stroke="#333333" stroke-width="0.20"/>
  <!-- Attach button to keyboard connector -->
  <line x1="98.9" y1="39.7" x2="86.1" y2="39.7" stroke="#333333" stroke-width="0.20"/>

  <!-- Step Attributes area (4 sub-containers with gaps) -->
  <rect x="3.96" y="55" width="22.04" height="27.3" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="4.21" y="55.25" width="21.54" height="26.8" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>
  <rect x="26.75" y="55" width="21" height="27.3" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="27" y="55.25" width="20.5" height="26.8" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>
  <rect x="48.5" y="55" width="10" height="27.3" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="48.75" y="55.25" width="9.5" height="26.8" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>
  <rect x="59.25" y="55" width="44.79" height="27.3" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="59.5" y="55.25" width="44.29" height="26.8" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>

  <!-- ========== RIGHT SIDE SUB-CONTAINERS ========== -->

  <!-- Section 1: Sequencer Controls (switches, display, knob, trans/rot, len/mode) -->
  <rect x="107.6" y="10" width="50.4" height="33.5" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="107.85" y="10.25" width="49.9" height="33" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>

  <!-- Section 2: Copy/Paste (copy, cpmode, paste) -->
  <rect x="107.6" y="44" width="50.4" height="13.7" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="107.85" y="44.25" width="49.9" height="13.2" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>

  <!-- Section 3: Transport (run, reset, clock, run CV, reset CV) -->
  <rect x="107.6" y="58.2" width="50.4" height="24.1" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="107.85" y="58.45" width="49.9" height="23.6" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>

  <!-- ========== BOTTOM SYNTH + I/O SUB-CONTAINERS ========== -->

  <!-- Synth controls section 1 (aligned with main left container, ends at 105mm) -->
  <rect x="4" y="86" width="101" height="30" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="4.25" y="86.25" width="100.5" height="29.5" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>

  <!-- Microtuning section (aligned with main right container, starts at 106.6mm) -->
  <rect x="106.6" y="86" width="35" height="30" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="106.85" y="86.25" width="34.5" height="29.5" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>

  <!-- Audio out section (small, centered on jack at 149.71mm) -->
  <rect x="143.4" y="86" width="14.6" height="30" rx="1.5" fill="url(#subContainerGradient)" stroke="#2a2a2a" stroke-width="0.3"/>
  <rect x="143.65" y="86.25" width="14.1" height="29.5" rx="1.25" fill="none" stroke="#6b4a20" stroke-width="0.15"/>


